spring:
  application:
    name: livin

  datasource:
    url: jdbc:mysql://${RDS_IP}:3306/efublivin?useSSL=false&useUnicode=true&characterEncoding=UTF8&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

  cloud:
    aws:
      region:
        static: ap-northeast-2
      stack:
        auto: false
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID}
        secret-key: ${AWS_SECRET_ACCESS_KEY}
      s3:
        bucket: ${AWS_S3_BUCKET_NAME}
        
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true   
jwt:
  secret: ${JWT_SECRET}

kakao:
  map:
    kakao-api-key: ${KAKAO_MAP_API_KEY}

naver:
  search:
    naver-client-id: ${NAVER_CLIENT_ID}
    naver-client-secret: ${NAVER_CLIENT_SECRET}
    
house:
  data:
    csv-paths: /app/data/마포구_표제부.csv,/app/data/서대문구_표제부.csv

logging:
  level:
    root: INFO
